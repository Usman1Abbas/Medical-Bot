<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="DxGPT — AI differential diagnosis assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: stethoscope with a heartbeat pulse forming a medical cross -->
  <g transform="translate(980,190)" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- earpiece tubing -->
    <path d="M -70 -78 C -70 -40 -50 -18 -28 -18 C -6 -18 14 -40 14 -78"/>
    <circle cx="-70" cy="-82" r="7"/>
    <circle cx="14" cy="-82" r="7"/>
    <!-- main tube down to chestpiece -->
    <path d="M -28 -18 C -28 22 -28 52 6 64"/>
    <!-- chestpiece -->
    <circle cx="22" cy="74" r="20"/>
    <circle cx="22" cy="74" r="6"/>
    <!-- heartbeat pulse line -->
    <path d="M -80 36 L -52 36 L -40 6 L -22 70 L -8 36 L 4 36"/>
    <!-- subtle medical cross accent -->
    <path d="M 64 -64 L 64 -24 M 44 -44 L 84 -44" opacity="0.85"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">DxGPT</text>
  <text x="84" y="232" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#60a5fa">Medical Expert System</text>
  <text x="84" y="288" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#eff6ff">AI-powered differential diagnosis from patient symptoms.</text>
  <text x="84" y="324" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#93c5fd">Streamlit · DxGPT · OpenAI GPT-4o · Python · educational</text>
</svg>
